services:
  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: http://localhost:4000
    container_name: ticket-client
    depends_on:
      gateway:
        condition: service_started
    ports:
      - "5173:80"
    networks:
      - ticket-network

  gateway:
    build: ./gateway
    container_name: ticket-gateway
    environment:
      PORT: 4000
      JWT_SECRET: super-secret-jwt-key
      AUTH_SERVICE_URL: http://auth-service:4001
      MOVIE_SERVICE_URL: http://movie-service:4002
      BOOKING_SERVICE_URL: http://booking-service:4003
      PAYMENT_SERVICE_URL: http://payment-service:4004
      NOTIFICATION_SERVICE_URL: http://notification-service:4005
      EVENT_SERVICE_URL: http://event-service:4006
    depends_on:
      auth-service:
        condition: service_started
      movie-service:
        condition: service_started
      booking-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
      event-service:
        condition: service_started
    ports:
      - "4000:4000"
    networks:
      - ticket-network

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    environment:
      PORT: 4001
      MONGO_URI: mongodb://mongo:27017/ticket_auth
      JWT_SECRET: super-secret-jwt-key
      ADMIN_REGISTRATION_KEY: superadmin123
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "4001:4001"
    networks:
      - ticket-network

  movie-service:
    build: ./services/movie-service
    container_name: movie-service
    environment:
      PORT: 4002
      MONGO_URI: mongodb://mongo:27017/ticket_movie
      JWT_SECRET: super-secret-jwt-key
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "4002:4002"
    networks:
      - ticket-network

  booking-service:
    build: ./services/booking-service
    container_name: booking-service
    environment:
      PORT: 4003
      MONGO_URI: mongodb://mongo:27017/ticket_booking
      JWT_SECRET: super-secret-jwt-key
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SEAT_LOCK_TTL_SECONDS: 300
      PAYMENT_MAX_RETRIES: 3
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "4003:4003"
    networks:
      - ticket-network

  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    environment:
      PORT: 4004
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PAYMENT_MAX_RETRIES: 3
      PAYMENT_RETRY_DELAY_MS: 5000
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "4004:4004"
    networks:
      - ticket-network

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    environment:
      PORT: 4005
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "4005:4005"
    networks:
      - ticket-network

  event-service:
    build: ./services/event-service
    container_name: event-service
    environment:
      PORT: 4006
      MONGO_URI: mongodb://mongo:27017/ticket_event
      JWT_SECRET: super-secret-jwt-key
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "4006:4006"
    networks:
      - ticket-network

  mongo:
    image: mongo:7
    container_name: ticket-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ticket-network

  redis:
    image: redis:7-alpine
    container_name: ticket-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ticket-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ticket-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ticket-network

volumes:
  mongo_data:
  rabbitmq_data:

networks:
  ticket-network:
    driver: bridge

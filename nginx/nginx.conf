events {
  worker_connections 1024;
}

http {

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" upstream="$upstream_addr"';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  upstream gateway_pool {
    least_conn;
    server ticket-gateway-1:4000;
    server ticket-gateway-2:4000;
    server ticket-gateway-3:4000;
    keepalive 32;
  }

  limit_req_zone $binary_remote_addr zone=api_ip:10m   rate=10r/s;
  limit_req_zone $server_name        zone=api_global:1m rate=200r/s;

  server {
    listen 80;
    server_name _;

    limit_req zone=api_ip     burst=20  nodelay;
    limit_req zone=api_global burst=100 nodelay;
    limit_req_status 429;

    proxy_http_version      1.1;
    proxy_set_header        Connection        "";
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_connect_timeout   10s;
    proxy_read_timeout      30s;
    proxy_send_timeout      30s;

    location /nginx-health {
      access_log off;
      return 200 '{"status":"nginx ok"}';
      add_header Content-Type application/json;
    }

    location / {
      proxy_pass http://gateway_pool;
    }
  }
}